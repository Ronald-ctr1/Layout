<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registro | TecnoGames</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../styles/form.css">

</head>

<body>

    <!-- MAIN -->
    <main class="contenedor-auth">

        <!-- FORMULARIO -->
        <section class="card-auth">

            <h1>
                Crear Cuenta
            </h1>

            <p>
                Únete a la comunidad gamer 🚀
            </p>

            <form>

                <!-- NOMBRE -->
                <div class="grupo-input">

                    <label>
                        Nombre Completo
                    </label>

                    <input type="text"
                           placeholder="Ingrese su nombre"
                           required>

                </div>

                <!-- EMAIL -->
                <div class="grupo-input">

                    <label>
                        Correo Electrónico
                    </label>

                    <input type="email"
                           placeholder="Ingrese su correo"
                           required>

                </div>

                <!-- PASSWORD -->
                <div class="grupo-input">

                    <label>
                        Contraseña
                    </label>

                    <input type="password"
                           placeholder="Ingrese su contraseña"
                           required>

                </div>

                <!-- BOTON -->
                <button type="submit"
                        class="btn-auth">

                    Registrarse

                </button>

            </form>

            <!-- LINK -->
            <div class="extra">

                <p>
                    ¿Ya tienes cuenta?
                </p>

                <a href="login.html">
                    Iniciar Sesión
                </a>

            </div>

        </section>

    </main>

    <!-- JS -->
    <script src="js/auth.js"></script>

</body>
</html>
